workflows:
  flutter-ios-build:
    name: Flutter iOS Build
    max_build_duration: 60

    environment:
      flutter: stable
      groups:
        - social_login_config

    scripts:
      - name: Clean Flutter project
        script: |
          echo "Cleaning Flutter project..."
          flutter clean

      - name: Upgrade Flutter packages
        script: |
          echo "Upgrading Flutter packages..."
          flutter pub upgrade

      - name: Get Flutter packages
        script: |
          echo "Getting Flutter packages..."
          flutter pub get

      - name: Force Clean CocoaPods & DerivedData
        script: |
          echo "Cleaning CocoaPods and DerivedData..."
          cd ios
          pod deintegrate
          rm -rf Pods
          rm -rf ~/Library/Caches/CocoaPods
          rm -f Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          cd ..

      - name: Install Pods (force update)
        script: |
          echo "Installing pods with repo update..."
          cd ios
          pod install --repo-update
          echo "Verifying Facebook XCFrameworks:"
          if [ -d "Pods/Release/FacebookSDK_Dynamic/XCFrameworks" ]; then
            echo "Facebook XCFrameworks are present"
            ls Pods/Release/FacebookSDK_Dynamic/XCFrameworks
          else
            echo "⚠️ Facebook XCFrameworks not found!"
          fi
          cd ..

      - name: Build iOS
        script: |
          echo "Building Flutter iOS app (release)..."
          flutter build ios --release --no-codesign
