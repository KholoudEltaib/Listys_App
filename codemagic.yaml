workflows:
  flutter-ios-build:
    name: Flutter iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - social_login_config
    scripts:
      - name: Clean Flutter project
        script: |
          echo "Cleaning Flutter project..."
          flutter clean

      - name: Get Flutter packages
        script: |
          echo "Getting Flutter packages..."
          flutter pub get

      - name: Clean CocoaPods (without touching cache)
        script: |
          echo "Cleaning CocoaPods..."
          cd ios
          pod deintegrate || true
          rm -rf Pods
          rm -f Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          cd ..

      - name: Install Pods
        script: |
          echo "Installing pods..."
          cd ios
          pod install --repo-update
          
          echo "Verifying Facebook XCFrameworks:"
          FB_CACHE=~/Library/Caches/CocoaPods/Pods/Release/FacebookSDK_Dynamic/XCFrameworks
          if [ -d "$FB_CACHE" ]; then
            echo "✅ Facebook XCFrameworks found:"
            ls "$FB_CACHE"
          else
            echo "⚠️ Not in cache, checking Pods directory..."
            find . -name "*.xcframework" | grep -i facebook || echo "❌ No Facebook XCFrameworks found anywhere!"
          fi
          cd ..

      - name: Build iOS
        script: |
          echo "Building Flutter iOS app (release)..."
          flutter build ios --release --no-codesign
