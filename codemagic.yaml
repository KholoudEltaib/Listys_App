workflows:
  flutter-ios-build:
    name: Flutter iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - social_login_config
    scripts:
      - name: Clean Flutter project
        script: |
          flutter clean

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Clean CocoaPods
        script: |
          cd ios
          pod deintegrate || true
          rm -rf Pods
          rm -f Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          cd ..

      - name: Install Pods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Fix and Build iOS
        script: |
          # Flutter بتعمل pod install تاني وبتمسح الـ fix
          # الحل: نعمل الـ fix جوه نفس الخطوة بعد flutter build مباشرة
          
          # Run flutter build (هيفشل بسبب double slash)
          flutter build ios --release --no-codesign || true
          
          # Fix double slash في كل الملفات
          echo "🔧 Fixing double-slash paths..."
          find ios/Pods -name "*.xcconfig" -exec sed -i '' 's|//Library/Caches|/Library/Caches|g' {} \; 2>/dev/null || true
          find ios/Pods -name "*.pbxproj" -exec sed -i '' 's|//Library/Caches|/Library/Caches|g' {} \; 2>/dev/null || true
          find ios -name "*.xcconfig" -exec sed -i '' 's|//Library/Caches|/Library/Caches|g' {} \; 2>/dev/null || true
          
          # Verify
          echo "✅ Verifying fix..."
          grep -r "//Library/Caches" ios/Pods --include="*.xcconfig" && echo "⚠️ Still has issues" || echo "✅ All paths fixed"
          
          # Build again after fix
          echo "🚀 Building again after fix..."
          flutter build ios --release --no-codesign
