workflows:
  flutter-ios-build:
    name: Flutter iOS Build
    max_build_duration: 60

    environment:
      flutter: stable
      groups:
        - social_login_config

    scripts:
      - name: Clean project
        script: |
          flutter clean

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Reset CocoaPods
        script: |
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          pod repo update
          cd ..

      - name: Install Pods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
