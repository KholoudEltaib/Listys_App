workflows:
  flutter-ios-build:
    name: Flutter iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - social_login_config
    scripts:
      - name: Clean Flutter project
        script: |
          flutter clean

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Clean CocoaPods
        script: |
          cd ios
          pod deintegrate || true
          rm -rf Pods
          rm -f Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          cd ..

      - name: Install Pods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Fix Facebook SDK double-slash paths
        script: |
          echo "Fixing double-slash in xcconfig files..."
          find ios/Pods -name "*.xcconfig" | xargs grep -l "FacebookSDK\|FBSDK" 2>/dev/null | while read f; do
            echo "Fixing: $f"
            sed -i '' 's|//Library/Caches|/Library/Caches|g' "$f"
          done
          
          echo "Fixing double-slash in pbxproj..."
          sed -i '' 's|//Library/Caches|/Library/Caches|g' ios/Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          
          echo "Fixing in Pods project..."
          find ios/Pods -name "*.pbxproj" | xargs sed -i '' 's|//Library/Caches|/Library/Caches|g' 2>/dev/null || true
          
          echo "Verifying fix:"
          grep -r "FacebookSDK" ios/Pods --include="*.xcconfig" | grep "//" && echo "⚠️ Still has double slash!" || echo "✅ No double slash found"

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
