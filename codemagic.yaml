workflows:
  flutter-ios-build:
    name: Flutter iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - social_login_config
    scripts:
      - name: Clean Flutter project
        script: |
          flutter clean
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Clean CocoaPods
        script: |
          cd ios
          pod deintegrate || true
          rm -rf Pods
          rm -f Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          cd ..
      - name: Install Pods
        script: |
          cd ios
          pod install --repo-update
          cd ..
      - name: Generate Flutter iOS build files
        script: |
          flutter build ios --release --no-codesign --config-only 2>/dev/null || true
      - name: Fix double-slash paths
        script: |
          echo "🔧 Fixing double-slash paths..."
          find ios -name "*.xcconfig" -exec sed -i '' 's|//Library/Caches|/Library/Caches|g' {} \;
          find ios/Pods -name "*.pbxproj" -exec sed -i '' 's|//Library/Caches|/Library/Caches|g' {} \;
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          echo "✅ Done fixing paths"
      - name: Build iOS with xcodebuild
        script: |
          echo "🚀 Building with xcodebuild..."
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ~/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty --color

    artifacts:
      - build/ios/ipa/Runner.ipa
      - build/app/outputs/flutter-apk/app-release.apk
